version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Create .env file from Amplify environment variables
        - |
          cat > .env << EOF
          NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
          NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
          NEXT_PUBLIC_GRAPHQL_URL=${NEXT_PUBLIC_GRAPHQL_URL}
          NEXT_PUBLIC_RAZORPAY_KEY_ID=${NEXT_PUBLIC_RAZORPAY_KEY_ID}
          NEXT_PUBLIC_R2_PUBLIC_URL=${NEXT_PUBLIC_R2_PUBLIC_URL}
          NEXT_PUBLIC_CF_IMAGE_RESIZING=${NEXT_PUBLIC_CF_IMAGE_RESIZING}
          EOF
        - echo "Generated .env file:"
        - cat .env
        - npm install --legacy-peer-deps
        - npm install sharp
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: Strict-Transport-Security
          value: 'max-age=31536000; includeSubDomains'
  redirects:
    # 1. HTTP → HTTPS (www)
    - source: 'http://www.bharatmock.com/<*>'
      target: 'https://bharatmock.com/<*>'
      status: '301'
      condition: null
    # 2. HTTP → HTTPS (non-www)
    - source: 'http://bharatmock.com/<*>'
      target: 'https://bharatmock.com/<*>'
      status: '301'
      condition: null
    # 3. HTTPS www → HTTPS non-www
    - source: 'https://www.bharatmock.com/<*>'
      target: 'https://bharatmock.com/<*>'
      status: '301'
      condition: null
