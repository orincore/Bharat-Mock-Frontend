name: Deploy frontend

on:
  push:
    branches: [main]

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/bharat-mock-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # NEXT_PUBLIC_* values are compiled into the bundle here — they are
      # public (shipped to every browser) by definition, so passing them as
      # build-args and non-secret GitHub Actions repo variables (not
      # `secrets.*`) is intentional and correct, not an oversight.
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
            NEXT_PUBLIC_RAZORPAY_KEY_ID=${{ vars.NEXT_PUBLIC_RAZORPAY_KEY_ID }}
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Roll out to KVM2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.KVM2_HOST }}
          username: ${{ secrets.KVM2_SSH_USER }}
          key: ${{ secrets.KVM2_SSH_KEY }}
          # Default connect timeout (30s) can be tight for the GH-runner ->
          # Hostinger network path; bumped to ride out transient jitter
          # rather than fail a build that already succeeded.
          timeout: 60s
          script: |
            set -euo pipefail
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            kubectl set image deployment/frontend frontend=${{ env.IMAGE }}:${{ github.sha }} -n bharatmock
            kubectl rollout status deployment/frontend -n bharatmock --timeout=180s
