server {
    listen 80;
    server_name bharatmock.com www.bharatmock.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name bharatmock.com www.bharatmock.com;

    ssl_certificate     /etc/letsencrypt/live/bharatmock.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bharatmock.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    # -----------------------------------------------------------------------
    # MIME types — must be set explicitly so nginx never guesses wrong
    # -----------------------------------------------------------------------
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # -----------------------------------------------------------------------
    # Gzip
    # -----------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/css
        text/javascript
        text/plain
        text/xml
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # -----------------------------------------------------------------------
    # Next.js static assets — long-lived immutable cache
    # -----------------------------------------------------------------------
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Force correct MIME types for common static file extensions
        location ~* \.css$ {
            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
            add_header Content-Type "text/css; charset=utf-8" always;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        location ~* \.(js|mjs)$ {
            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
            add_header Content-Type "application/javascript; charset=utf-8" always;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        location ~* \.(woff|woff2)$ {
            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # -----------------------------------------------------------------------
    # Next.js image optimisation endpoint
    # -----------------------------------------------------------------------
    location /_next/image {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=3600" always;
    }

    # -----------------------------------------------------------------------
    # All other requests — proxy to Next.js
    # -----------------------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
    }

    access_log /var/log/nginx/bharat-mock-frontend-access.log;
    error_log  /var/log/nginx/bharat-mock-frontend-error.log;
}
